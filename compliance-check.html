<style>
/* 合规自检页面专属样式 */
.cc-container { max-width: 800px; margin: 100px auto 60px; padding: 0 20px; }
.cc-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px; backdrop-filter: blur(20px); box-shadow: var(--glass-shadow); }
.cc-header { text-align: center; margin-bottom: 40px; }
.cc-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.cc-header p { color: var(--text-secondary); font-size: 15px; }
/* 进度条 */
.cc-progress { margin-bottom: 36px; }
.cc-progress-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.cc-progress-fill { height: 100%; background: var(--accent-gradient); border-radius: 3px; transition: width var(--transition-normal); width: 0%; }
.cc-progress-text { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 13px; }
.cc-progress-text span:last-child { color: var(--accent-primary); font-weight: 500; }
/* 步骤默认隐藏 */
.cc-step { display: none; }
.cc-step.active { display: block; }
.cc-step-label { font-size: 13px; color: var(--accent-primary); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.cc-step-number { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
.cc-question { font-size: 20px; font-weight: 600; margin-bottom: 28px; line-height: 1.5; }
/* 选项按钮 */
.cc-option { display: block; width: 100%; padding: 16px 20px; margin-bottom: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-primary); font-size: 15px; cursor: pointer; transition: all var(--transition-fast); text-align: left; font-family: var(--font-body); line-height: 1.5; }
.cc-option:hover { border-color: var(--accent-primary); background: rgba(139, 92, 246, 0.1); transform: translateX(4px); }
.cc-option.selected { border-color: var(--accent-primary); background: rgba(139, 92, 246, 0.15); box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); }
.cc-option .opt-dimension { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
/* 导航按钮 */
.cc-nav { display: flex; justify-content: space-between; margin-top: 24px; }
.cc-btn { padding: 12px 28px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-primary); border-radius: 12px; cursor: pointer; font-size: 14px; font-family: var(--font-body); transition: all var(--transition-fast); }
.cc-btn:hover { border-color: var(--accent-primary); }
.cc-btn.primary { background: var(--accent-gradient); border: none; color: white; font-weight: 600; }
.cc-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }
.cc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
/* 结果页面 */
.cc-result { display: none; }
.cc-result.active { display: block; }
.cc-score-circle { width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 6px solid; }
.cc-score-circle .score-num { font-size: 48px; font-weight: 800; }
.cc-score-circle .score-label { font-size: 14px; color: var(--text-secondary); }
.cc-score-circle.green { border-color: #10B981; }
.cc-score-circle.green .score-num { color: #10B981; }
.cc-score-circle.yellow { border-color: #F59E0B; }
.cc-score-circle.yellow .score-num { color: #F59E0B; }
.cc-score-circle.red { border-color: #EF4444; }
.cc-score-circle.red .score-num { color: #EF4444; }
/* 维度得分 */
.cc-dimensions { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 32px 0; }
@media (max-width: 600px) { .cc-dimensions { grid-template-columns: 1fr; } }
.cc-dim-item { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; }
.cc-dim-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
.cc-dim-name { font-weight: 500; }
.cc-dim-score { font-weight: 600; }
.cc-dim-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.cc-dim-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.cc-dim-fill.green { background: #10B981; }
.cc-dim-fill.yellow { background: #F59E0B; }
.cc-dim-fill.red { background: #EF4444; }
/* 推荐方案 */
.cc-recommend { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; margin: 24px 0; }
.cc-recommend h3 { font-size: 16px; margin-bottom: 12px; }
.cc-rec-item { padding: 12px 16px; margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
.cc-rec-item.active { border-color: var(--accent-primary); background: rgba(139, 92, 246, 0.1); }
.cc-rec-name { font-weight: 500; }
.cc-rec-price { color: var(--accent-primary); font-weight: 600; }
.cc-rec-tag { font-size: 12px; padding: 2px 10px; border-radius: 20px; background: rgba(139, 92, 246, 0.15); color: var(--accent-primary); }
/* 联系表单 */
.cc-contact { display: none; margin-top: 24px; }
.cc-contact.active { display: block; }
.cc-contact input, .cc-contact textarea { width: 100%; padding: 14px 16px; margin-bottom: 12px; background: var(--bg-tertiary); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 14px; font-family: var(--font-body); }
.cc-contact input:focus, .cc-contact textarea:focus { outline: none; border-color: var(--accent-primary); }
/* 加载动画 */
.cc-loading { display: none; text-align: center; padding: 40px; }
.cc-loading.active { display: block; }
.cc-spinner { width: 40px; height: 40px; border: 3px solid var(--bg-tertiary); border-top: 3px solid var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
/* 语言切换 */
.lang-switch { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; gap: 4px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px; }
.lang-btn { padding: 6px 14px; border: none; background: transparent; color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 13px; font-family: var(--font-body); transition: all var(--transition-fast); }
.lang-btn.active { background: var(--accent-primary); color: white; }
</style>

let currentLang = 'zh-CN';
function t(key) { const d = CC_LANG[currentLang]; return d && d[key] ? d[key] : key; }

function switchLang(lang) {
currentLang = lang;
document.documentElement.lang = lang;
document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(lang === 'zh-CN' ? '中文' : lang === 'ko-KR' ? '한국' : 'English')));
applyLang();
}

function applyLang() {
document.querySelectorAll('[data-lang-key]').forEach(el => {
const key = el.getAttribute('data-lang-key');
if (t(key) !== key) el.textContent = t(key);
});
// 重绘动态内容
if (typeof QUESTIONS !== 'undefined') renderQuestions();
if (quizData) renderResult(quizData);
}

let currentStep = 0;
let answers = {};
let quizData = null;

if (res.ok) { QUESTIONS = await res.json(); }

function renderQuestions() {
const container = document.getElementById('questionsContainer');
container.innerHTML = '';
QUESTIONS.forEach((q, idx) => {
const step = document.createElement('div');
step.className = 'cc-step' + (idx === 0 ? ' active' : '');
step.id = 'step-' + idx;
let optionsHtml = q.options.map((opt, oi) => {
const selected = answers[q.id] === oi ? ' selected' : '';
return `<button class="cc-option${selected}" onclick="selectOption(${idx}, ${oi})">
<span class="opt-dimension">${currentLang === 'ko-KR' ? (q.dimension_ko || q.dimension) : q.dimension}</span>
<br>${currentLang === 'ko-KR' ? opt.label_ko : opt.label_zh}
</button>`;
}).join('');
step.innerHTML = `<div class="cc-step-label" data-lang-key="cc_start">${t('cc_start')}</div>
<div class="cc-step-number">${t('cc_progress')}: ${idx+1}/${QUESTIONS.length}</div>
<div class="cc-question">${currentLang === 'ko-KR' ? (q.question_ko || q.question_zh) : q.question_zh}</div>
${optionsHtml}`;
container.appendChild(step);
});
updateProgress();
updateNavButtons();
applyLang();
}

function selectOption(stepIdx, optIdx) {
const q = QUESTIONS[stepIdx];
answers[q.id] = optIdx;
// 视觉反馈
const step = document.getElementById('step-' + stepIdx);
step.querySelectorAll('.cc-option').forEach((btn, i) => btn.classList.toggle('selected', i === optIdx));
// 自动进入下一步
setTimeout(() => { if (stepIdx < QUESTIONS.length - 1) goToStep(stepIdx + 1); else submitCheck(); }, 300);
}

function goToStep(idx) {
currentStep = idx;
document.querySelectorAll('.cc-step').forEach((s, i) => s.classList.toggle('active', i === idx));
updateProgress();
updateNavButtons();
}

function prevStep() { if (currentStep > 0) goToStep(currentStep - 1); }
function nextStep() { if (currentStep < QUESTIONS.length - 1) goToStep(currentStep + 1); }

function updateProgress() {
const answered = Object.keys(answers).length;
const fill = document.getElementById('progressFill');
fill.style.width = (answered / QUESTIONS.length * 100) + '%';
document.getElementById('progressCount').textContent = answered + '/' + QUESTIONS.length;
}

function updateNavButtons() {
document.getElementById('prevBtn').style.display = currentStep > 0 ? 'inline-block' : 'none';
document.getElementById('nextBtn').style.display = (currentStep < QUESTIONS.length - 1 && answers[QUESTIONS[currentStep].id] !== undefined) ? 'inline-block' : 'none';
document.getElementById('submitBtn').style.display = (currentStep === QUESTIONS.length - 1 && answers[QUESTIONS[currentStep].id] !== undefined) ? 'inline-block' : 'none';
}

// ─── 提交评估 ───
async function submitCheck() {
const allAnswered = QUESTIONS.every(q => answers[q.id] !== undefined);
if (!allAnswered) {
showToast(currentLang === 'zh-CN' ? '请回答所有题目' : currentLang === 'ko-KR' ? '모든 질문에 답해주세요' : 'Please answer all questions', 'error');
return;
}
document.getElementById('loadingSpinner').classList.add('active');
document.getElementById('quizCard').style.display = 'none';
document.getElementById('resultCard').style.display = 'none';

const payload = { answers: QUESTIONS.map((q, i) => ({ question_id: q.id, option_index: answers[q.id], dimension: q.dimension })) };
try {
const res = await fetch('/api/v1/compliance/check', {
method: 'POST', headers: {'Content-Type':'application/json'},
body: JSON.stringify(payload)
});
if (res.ok) {
quizData = await res.json();
document.getElementById('loadingSpinner').classList.remove('active');
renderResult(quizData);
} else {
throw new Error('submit failed');
}
} catch(e) {
// 离线演示模式
quizData = calculateLocalScore();
document.getElementById('loadingSpinner').classList.remove('active');
renderResult(quizData);
}
}

function calculateLocalScore() {
const dims = ['行业准入','数据安全','知识产权','财税','用工','签证'];
const dimScores = {};
dims.forEach(d => dimScores[d] = { total:0, max:0, count:0 });
QUESTIONS.forEach(q => {
const ans = answers[q.id];
if (ans !== undefined) {
if (!dimScores[q.dimension]) dimScores[q.dimension] = { total:0, max:0, count:0 };
dimScores[q.dimension].total += q.options[ans].value;
dimScores[q.dimension].max += q.options[q.options.length-1].value;
dimScores[q.dimension].count++;
}
});
const dimResults = dims.filter(d => dimScores[d] && dimScores[d].count > 0).map(d => {
const score = dimScores[d].max > 0 ? Math.round((1 - dimScores[d].total / dimScores[d].max) * 100) : 100;
return { dimension: d, score, status: score >= 80 ? 'low' : score >= 50 ? 'medium' : 'high' };
});
const totalScore = dimResults.length > 0 ? Math.round(dimResults.reduce((s, d) => s + d.score, 0) / dimResults.length) : 0;
return { score: totalScore, dimensions: dimResults, token: 'local-' + Date.now() };
}

function renderResult(data) {
const score = data.score || 0;
document.getElementById('resultCard').style.display = 'block';

const circle = document.getElementById('scoreCircle');
circle.className = 'cc-score-circle ' + (score >= 80 ? 'green' : score >= 50 ? 'yellow' : 'red');
document.getElementById('scoreNum').textContent = score + '%';

const dims = data.dimensions || [];
const container = document.getElementById('dimensionsContainer');
container.innerHTML = '';
dims.forEach(d => {
const scoreVal = d.score || 0;
const statusCls = scoreVal >= 80 ? 'green' : scoreVal >= 50 ? 'yellow' : 'red';
const riskKey = scoreVal >= 80 ? 'risk_low' : scoreVal >= 50 ? 'risk_med' : 'risk_high';
container.innerHTML += `<div class="cc-dim-item"><div class="cc-dim-header">
<span class="cc-dim-name">${currentLang === 'ko-KR' ? (t('dim_' + d.dimension) || d.dimension) : t('dim_' + d.dimension) || d.dimension}</span>
<span class="cc-dim-score">${t(riskKey)} (${scoreVal}%)</span></div>
<div class="cc-dim-bar"><div class="cc-dim-fill ${statusCls}" style="width:${scoreVal}%"></div></div></div>`;
});

// 推荐方案
const list = document.getElementById('recommendList');
const plans = score >= 80
? [{name:t('rec_free'), price:'¥0', tag:t('rec_free_desc'), active:true},{name:t('rec_depth'), price:'¥9,800', tag:t('rec_depth_desc'), active:false}]
: score >= 50
? [{name:t('rec_free'), price:'¥0', tag:t('rec_free_desc'), active:false},{name:t('rec_depth'), price:'¥9,800', tag:t('rec_depth_desc'), active:true},{name:t('rec_year'), price:'¥58,000/年', tag:t('rec_year_desc'), active:false}]
: [{name:t('rec_free'), price:'¥0', tag:t('rec_free_desc'), active:false},{name:t('rec_depth'), price:'¥9,800', tag:t('rec_depth_desc'), active:false},{name:t('rec_year'), price:'¥58,000/年', tag:t('rec_year_desc'), active:true}];
list.innerHTML = plans.map(p => `<div class="cc-rec-item${p.active ? ' active' : ''}"><span class="cc-rec-name">${p.name}</span><span class="cc-rec-tag">${p.tag}</span><span class="cc-rec-price">${p.price}</span></div>`).join('');
applyLang();
}

function showContactForm() {
document.getElementById('contactForm').classList.add('active');
}

async function getPdfReport() {
const name = document.getElementById('contactName').value.trim();
const email = document.getElementById('contactEmail').value.trim();
if (!name || !email) { showToast('请填写姓名和邮箱', 'error'); return; }
if (quizData && quizData.token) {
try {
const res = await fetch(`/api/v1/compliance/report/${quizData.token}/pdf`, { method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({ name, email, company: document.getElementById('contactCompany').value, phone: document.getElementById('contactPhone').value })
});
if (res.ok) {
showToast('报告已发送到您的邮箱', 'success');
document.getElementById('contactForm').classList.remove('active');
return;
}
} catch(e) {}
}
showToast('报告功能当前为演示模式，请联系我们获取完整报告', 'info');
}

// ─── 初始化 ───
document.addEventListener('DOMContentLoaded', loadQuestions);
window.selectOption = selectOption;
window.prevStep = prevStep;
window.nextStep = nextStep;
window.submitCheck = submitCheck;
window.showContactForm = showContactForm;
window.getPdfReport = getPdfReport;
window.switchLang = switchLang;
</script>
