<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>充值 - 中韩出海数智港</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="/js/auth.js"></script>
<style>
body{background:#0a0e1a;font-family:'Inter',sans-serif;}
.glow-card{background:linear-gradient(135deg,rgba(30,41,59,0.9),rgba(15,23,42,0.95));border:1px solid rgba(99,102,241,0.15);}
.plan-card{background:linear-gradient(135deg,rgba(30,41,59,0.6),rgba(15,23,42,0.7));border:1px solid rgba(99,102,241,0.1);cursor:pointer;transition:all .3s;}
.plan-card:hover,.plan-card.selected{border-color:rgba(99,102,241,0.5);}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.gradient-text{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
</style>
</head>
<body class="p-4 md:p-8 min-h-screen">
<div x-data="payPage()" class="max-w-3xl mx-auto">
<div class="mb-8"><a href="/account.html" class="text-gray-500 hover:text-gray-300 text-sm">&larr; 返回会员中心</a></div>
<div class="text-center mb-10"><h1 class="text-3xl font-bold gradient-text">充值额度</h1><p class="text-gray-500 mt-2">选择套餐，获取更多AI合规官查询额度</p></div>
<div class="grid md:grid-cols-2 gap-6 mb-8">
<div class="plan-card rounded-2xl p-6" :class="{'selected':sel==='basic','border-amber-500/30':sel==='basic'}" @click="sel='basic'">
<div class="text-sm text-gray-400 mb-1">基础版</div>
<div class="text-3xl font-bold text-white mb-2">¥99 <span class="text-lg text-gray-500 font-normal">/ 月</span></div>
<div class="text-gray-300 text-lg mb-4">100 次查询额度</div>
<ul class="space-y-2 text-sm text-gray-400"><li class="flex items-center gap-2">✅ 基础合规诊断</li><li class="flex items-center gap-2">✅ 标准报告导出</li></ul>
<div class="mt-4 text-xs text-gray-500">¥0.99 / 次</div>
</div>
<div class="plan-card rounded-2xl p-6 relative overflow-hidden" :class="{'selected':sel==='pro','border-amber-500/50':sel==='pro'}" @click="sel='pro'">
<div class="absolute top-0 right-0 bg-amber-500 text-black text-xs font-bold px-4 py-1 rounded-bl-xl">推荐</div>
<div class="text-sm text-gray-400 mb-1">专业版</div>
<div class="text-3xl font-bold text-white mb-2">¥299 <span class="text-lg text-gray-500 font-normal">/ 月</span></div>
<div class="text-gray-300 text-lg mb-4">500 次查询额度</div>
<ul class="space-y-2 text-sm text-gray-400"><li class="flex items-center gap-2">✅ 深度合规诊断</li><li class="flex items-center gap-2">✅ 完整报告+数据分析</li><li class="flex items-center gap-2">✅ 专属合规顾问</li></ul>
<div class="mt-4 text-xs text-gray-500">¥0.60 / 次 <span class="text-green-400">省39%</span></div>
</div>
</div>
<div class="glow-card rounded-2xl p-6">
<div class="flex justify-between items-center mb-4"><div><p class="text-gray-400 text-sm">已选套餐</p><p class="text-white text-xl font-semibold" x-text="sel==='basic'?'基础版':'专业版'"></p></div><div class="text-right"><p class="text-gray-400 text-sm">金额</p><p class="text-3xl font-bold gradient-text" x-text="sel==='basic'?'¥99':'¥299'"></p></div></div>
<button @click="pay" :disabled="loading||!sel" class="btn-primary w-full rounded-xl py-3 text-white font-semibold mt-4 flex items-center justify-center gap-2">
<svg x-show="loading" class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span x-text="loading?'处理中...':'确认支付'"></span>
</button>
</div>
<div x-show="msg" class="mt-4 text-center text-sm" :class="msgType==='ok'?'text-green-400':'text-red-400'" x-text="msg"></div>
</div>
<script>
function payPage() {
    return{sel:'pro',loading:false,msg:'',msgType:'',plans:{basic:{price:99,quota:100},pro:{price:299,quota:500}},
    async pay(){
        if(!AUTH.isLoggedIn()){window.location.href='/login.html?redirect=/payment.html';return;}
        this.loading=true;this.msg='';
        try{
            const p=this.plans[this.sel];const u=AUTH.getUser();
            const r=await fetch('/api/v1/payment/create',{method:'POST',headers:{'Content-Type':'application/json',...AUTH.authHeader()},body:JSON.stringify({plan_type:this.sel,user_id:u?.id,user_name:u?.username,user_email:u?.email,amount:p.price,quota:p.quota})});
            const d=await r.json();
            if(d.success){
                this.msg=`✅ 支付成功！已充值 ${p.quota} 次额度`;this.msgType='ok';
                setTimeout(()=>window.location.href='/account.html',2000);
            } else {this.msg=`❌ ${d.detail||'支付失败'}`;this.msgType='err';}
        }catch(e){this.msg='❌ 网络错误';this.msgType='err';}finally{this.loading=false;}
    }};
</script>
</body>
</html>
