# 中韩出海数智港 — Nginx 站点配置
# 目标服务器: 47.100.160.250 (阿里云ECS, Ubuntu, nginx/1.24.0)
# 域名: go-aiport.com / www.go-aiport.com
# 部署路径: sudo ln -sf /etc/nginx/sites-available/go-aiport.com /etc/nginx/sites-enabled/
#           或直接替换 /etc/nginx/sites-enabled/opc-api

# ──────────── HTTP → HTTPS 重定向 ────────────
server {
    listen 80;
    listen [::]:80;
    server_name go-aiport.com www.go-aiport.com;

    # Let's Encrypt 证书验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 301 永久重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ──────────── HTTPS 站点 ────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name go-aiport.com www.go-aiport.com;

    # ── SSL 配置 (Let's Encrypt) ──
    ssl_certificate /etc/letsencrypt/live/go-aiport.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/go-aiport.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── 安全头 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;

    # ── 网站根目录 ──
    root /var/www/china-korea-digital-port;
    index index.html;

    # ──────────── API 反向代理 ────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 20M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # API 文档 (Swagger / OpenAPI)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    # ──────────── 健康检查 ────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ──────────── 管理后台 ────────────
    # /admin/ 目录由 nginx 直接提供静态文件，SPA fallback 到 admin/index.html
    location /admin/ {
        alias /var/www/china-korea-digital-port/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ──────────── 定价页面 ────────────
    location = /pricing {
        try_files /pricing.html =404;
    }
    location = /pricing.html {
        # 直接命中静态文件
    }

    # ──────────── 图标 ────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # ──────────── 静态资源 (CSS/JS) ────────────
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ──────────── 其它静态资源 (图片/字体) ────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ──────────── 首页 / SPA 根路由 ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────── 安全规则 ────────────

    # 禁止访问数据库文件
    location ~ \.(db|sqlite|sqlite3)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 禁止访问隐藏文件 (.git, .env, .htaccess 等)
    location ~ /\.. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 禁止访问敏感文件
    location ~* \.(env|git|log|bak|swp|old|backup|config|yml|yaml|json|md)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 禁止访问 __pycache__ 目录
    location ~ /__pycache__/ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # ──────────── 日志 ────────────
    access_log /var/log/nginx/go-aiport-access.log;
    error_log  /var/log/nginx/go-aiport-error.log;
}
