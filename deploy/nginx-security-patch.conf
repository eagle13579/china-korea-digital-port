# ──────────── 安全规则补丁 ────────────
# 用途：粘贴到 /etc/nginx/sites-enabled/opc-api 的 server block 中
# 位置：建议放在 server block 末尾（最后一个 location 之后）
# 操作：sudo cp /var/www/china-korea-digital-port/deploy/nginx-security-patch.conf /tmp/
#       然后手动将内容插入 /etc/nginx/sites-enabled/opc-api
#       插入后执行 sudo nginx -t && sudo systemctl reload nginx
#
# 补丁A：禁止访问数据库文件 (*.db, *.sqlite, *.sqlite3)
location ~ \.(db|sqlite|sqlite3)$ {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# 补丁B：禁止访问隐藏文件 (.git, .env, .htaccess 等以点开头的文件/目录)
# 注意：必须用 /\. 转义点号，否则 /. 匹配所有路径导致首页404
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# 补丁C：禁止访问敏感文件类型
# (env, git, log, bak, swp, old, backup, config, yml, yaml, json, md)
location ~* \.(env|git|log|bak|swp|old|backup|config|yml|yaml|json|md)$ {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}
