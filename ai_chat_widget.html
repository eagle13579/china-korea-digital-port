<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Widget - 中韩出海数智港</title>
<style>
  /* ── 页面演示样式（非 widget 本身） ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .demo-content {
    max-width: 680px;
    text-align: center;
  }
  .demo-content h1 {
    font-size: 28px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .demo-content p {
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 8px;
    font-size: 15px;
  }
  .demo-content code {
    background: #1e1e36;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
    color: #a78bfa;
  }
  .demo-footer {
    margin-top: 24px;
    padding: 16px 24px;
    background: #1a1a2e;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    text-align: left;
  }
  .demo-footer h3 {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .demo-footer pre {
    background: #0f0f1a;
    padding: 12px 16px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    color: #a78bfa;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="demo-content">
  <h1>🤖 AI 客服 Widget</h1>
  <p>
    中韩出海数智港 — 智能客服对话组件<br>
    右下角点击 💬 气泡打开聊天窗口
  </p>
  <p style="font-size: 13px; color: #64748b;">
    服务状态: <span id="health-status">检查中...</span>
  </p>

  <div class="demo-footer">
    <h3>📦 嵌入方式</h3>
    <pre>&lt;script src="/ai_chat_widget.js"&gt;&lt;/script&gt;
&lt;script&gt;
  AIChatWidget.init({
    apiUrl: 'http://YOUR_SERVER:5198',
    title: 'AI 客服',
    subtitle: '在线咨询',
    avatar: '🤖',
  });
&lt;/script&gt;</pre>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     AI Chat Widget 内嵌实现
     ══════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  // ── 配置 ─────────────────────────────────────────────
  var CONFIG = {
    apiUrl: window.location.origin.replace(/:\d+$/, '') + ':5198',
    position: 'right',
    title: 'AI 客服',
    subtitle: '在线咨询',
    avatar: '🤖',
    autoOpen: false,
    welcomeDelay: 500,
  };

  // ── 语言检测 ─────────────────────────────────────────
  var lang = (navigator.language || 'zh').toLowerCase();
  var LANGUAGE = lang.startsWith('ko') ? 'ko' : lang.startsWith('zh') ? 'zh' : 'en';

  // ── 多语言文案 ───────────────────────────────────────
  var I18N = {
    zh: {
      welcome: '您好！我是中韩出海数智港的AI客服助手。有什么可以帮您的吗？😊',
      placeholder: '输入消息...',
      error: '⚠️ 抱歉，暂时无法回复。',
      netError: '⚠️ 网络连接异常，请稍后再试。',
    },
    ko: {
      welcome: '안녕하세요! 한중 해외 진출 디지털 포트의 AI 고객 서비스 어시스턴트입니다. 무엇을 도와드릴까요? 😊',
      placeholder: '메시지를 입력하세요...',
      error: '⚠️ 죄송합니다. 일시적으로 답변할 수 없습니다.',
      netError: '⚠️ 네트워크 연결이 불안정합니다. 나중에 다시 시도해주세요.',
    },
    en: {
      welcome: 'Hello! I\'m the AI customer service assistant of China-Korea Digital Port. How can I help you? 😊',
      placeholder: 'Type a message...',
      error: '⚠️ Sorry, unable to reply at the moment.',
      netError: '⚠️ Network connection error. Please try again later.',
    },
  };
  var T = I18N[LANGUAGE] || I18N.zh;

  // ── 健康检查 ─────────────────────────────────────────
  (function checkHealth() {
    var el = document.getElementById('health-status');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', CONFIG.apiUrl + '/health', true);
    xhr.timeout = 5000;
    xhr.onload = function () {
      if (xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          el.textContent = '✅ ' + (d.mode === 'mock' ? '模拟模式' : 'DeepSeek API');
          el.style.color = '#22c55e';
        } catch (e) {
          el.textContent = '⚠️ 响应异常';
          el.style.color = '#f59e0b';
        }
      } else {
        el.textContent = '❌ 服务不可用';
        el.style.color = '#ef4444';
      }
    };
    xhr.onerror = xhr.ontimeout = function () {
      el.textContent = '❌ 服务未启动';
      el.style.color = '#ef4444';
    };
    xhr.send();
  })();

  // ── DOM 工具 ─────────────────────────────────────────
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'style' && typeof attrs[k] === 'object') {
        Object.keys(attrs[k]).forEach(function (sk) { e.style[sk] = attrs[k][sk]; });
      } else if (k.startsWith('on')) {
        e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === 'className') {
        e.className = attrs[k];
      } else {
        e.setAttribute(k, attrs[k]);
      }
    });
    if (children) {
      (Array.isArray(children) ? children : [children]).forEach(function (c) {
        if (typeof c === 'string') e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
      });
    }
    return e;
  }

  // ── 样式注入 ─────────────────────────────────────────
  (function injectStyles() {
    var s = document.createElement('style');
    s.textContent = `
      @keyframes aiChatBounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
      @keyframes aiChatFadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
      .ai-chat-msg-enter { animation: aiChatFadeIn 0.3s ease-out both; }
    `;
    document.head.appendChild(s);
  })();

  // ── 构建 Widget ─────────────────────────────────────
  var messages = [];
  var isOpen = false;
  var isLoading = false;

  // 容器
  var container = el('div', { style: {
    position: 'fixed', bottom: '24px', zIndex: '2147483647',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
  }});
  container.style[CONFIG.position] = '24px';

  // 窗口
  var win = el('div', { style: {
    position: 'absolute', bottom: '72px',
    width: '360px', height: '520px',
    background: '#1a1a2e', borderRadius: '16px',
    boxShadow: '0 8px 32px rgba(0,0,0,0.5)',
    display: 'none', flexDirection: 'column', overflow: 'hidden',
    border: '1px solid rgba(255,255,255,0.08)',
  }});
  win.style[CONFIG.position] = '0';

  // Header
  var header = el('div', { style: {
    padding: '16px 20px',
    background: 'linear-gradient(135deg, #4f46e5, #7c3aed)',
    display: 'flex', alignItems: 'center', gap: '12px', flexShrink: 0,
  }});
  var avatar = el('div', { style: {
    width: '36px', height: '36px', borderRadius: '50%',
    background: 'rgba(255,255,255,0.2)', display: 'flex',
    alignItems: 'center', justifyContent: 'center', fontSize: '18px',
  }}, CONFIG.avatar);
  var info = el('div', { style: { flex: 1 }},
    el('div', { style: { color: '#fff', fontWeight: 600, fontSize: '15px' }}, CONFIG.title),
    el('div', { style: { color: 'rgba(255,255,255,0.7)', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '4px' }},
      el('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: '#22c55e', display: 'inline-block' }}),
      CONFIG.subtitle
    )
  );
  var closeBtn = el('button', {
    style: {
      background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff',
      width: '28px', height: '28px', borderRadius: '50%', cursor: 'pointer',
      fontSize: '16px', display: 'flex', alignItems: 'center', justifyContent: 'center',
    },
    on: { click: function () { close(); } },
  }, '✕');
  header.appendChild(avatar); header.appendChild(info); header.appendChild(closeBtn);

  // 消息区域
  var msgArea = el('div', { style: {
    flex: 1, overflowY: 'auto', padding: '16px',
    display: 'flex', flexDirection: 'column', gap: '10px', background: '#1a1a2e',
  }});

  // 输入区域
  var input = el('textarea', {
    style: {
      flex: 1, background: '#2d2d44', border: '1px solid rgba(255,255,255,0.1)',
      borderRadius: '10px', padding: '10px 14px', color: '#e2e8f0', fontSize: '14px',
      outline: 'none', resize: 'none', maxHeight: '120px', fontFamily: 'inherit', lineHeight: '1.4',
    },
    placeholder: T.placeholder,
    rows: 1,
    on: {
      keydown: function (e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); send(); }
      },
      input: function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        sendBtn.style.opacity = this.value.trim() ? '1' : '0.4';
        sendBtn.style.cursor = this.value.trim() ? 'pointer' : 'not-allowed';
        sendBtn.disabled = !this.value.trim();
      },
    },
  });

  var sendBtn = el('button', {
    style: {
      background: '#4f46e5', border: 'none', color: '#fff', width: '42px', height: '42px',
      borderRadius: '10px', cursor: 'pointer', fontSize: '18px', display: 'flex',
      alignItems: 'center', justifyContent: 'center', flexShrink: 0, opacity: 0.4, cursor: 'not-allowed',
    },
    on: { click: function () { send(); } },
  });
  sendBtn.innerHTML = '↑';
  sendBtn.disabled = true;

  var inputArea = el('div', { style: {
    padding: '12px 16px', background: '#1e1e36',
    borderTop: '1px solid rgba(255,255,255,0.06)',
    display: 'flex', gap: '8px', alignItems: 'flex-end', flexShrink: 0,
  }});
  inputArea.appendChild(input); inputArea.appendChild(sendBtn);

  win.appendChild(header); win.appendChild(msgArea); win.appendChild(inputArea);

  // 气泡按钮
  var bubble = el('button', {
    style: {
      width: '56px', height: '56px', borderRadius: '50%', background: '#4f46e5',
      display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
      boxShadow: '0 4px 12px rgba(79,70,229,0.4)', transition: 'all 0.3s ease',
      fontSize: '24px', border: 'none', userSelect: 'none',
    },
    on: {
      click: function () { toggle(); },
      mouseenter: function () { this.style.transform = 'scale(1.1)'; this.style.boxShadow = '0 6px 20px rgba(79,70,229,0.5)'; },
      mouseleave: function () { this.style.transform = 'scale(1)'; this.style.boxShadow = '0 4px 12px rgba(79,70,229,0.4)'; },
    },
  }, '💬');

  container.appendChild(win); container.appendChild(bubble);
  document.body.appendChild(container);

  // ── 功能函数 ─────────────────────────────────────────
  function addMessage(text, role) {
    var row = el('div', {
      style: {
        display: 'flex', maxWidth: '85%',
        alignSelf: role === 'bot' ? 'flex-start' : 'flex-end',
        flexDirection: role === 'user' ? 'row-reverse' : 'row',
      },
      className: 'ai-chat-msg-enter',
    });
    var bbl = el('div', { style: {
      padding: '10px 14px', borderRadius: '14px', fontSize: '14px',
      lineHeight: '1.5', wordBreak: 'break-word', whiteSpace: 'pre-wrap',
    }}, text);
    if (role === 'bot') {
      bbl.style.background = '#2d2d44'; bbl.style.color = '#e2e8f0';
      bbl.style.borderBottomLeftRadius = '4px';
    } else {
      bbl.style.background = '#4f46e5'; bbl.style.color = '#fff';
      bbl.style.borderBottomRightRadius = '4px';
    }
    row.appendChild(bbl);
    msgArea.appendChild(row);
    msgArea.scrollTop = msgArea.scrollHeight;
    messages.push({ text: text, role: role });
  }

  function showTyping() {
    var typing = el('div', {
      style: {
        display: 'flex', maxWidth: '85%', alignSelf: 'flex-start',
        padding: '10px 14px', borderRadius: '14px', background: '#2d2d44',
        borderBottomLeftRadius: '4px', gap: '4px',
      },
      className: 'ai-chat-msg-enter',
      id: 'ai-chat-typing',
    });
    for (var i = 0; i < 3; i++) {
      var dot = el('span', { style: {
        width: '6px', height: '6px', borderRadius: '50%',
        background: '#6b7280', animation: 'aiChatBounce 1.4s infinite ease-in-out both',
      }});
      if (i === 1) dot.style.animationDelay = '-0.16s';
      if (i === 2) dot.style.animationDelay = '-0.32s';
      typing.appendChild(dot);
    }
    msgArea.appendChild(typing);
    msgArea.scrollTop = msgArea.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById('ai-chat-typing');
    if (t) t.remove();
  }

  function send() {
    if (isLoading) return;
    var text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    sendBtn.style.opacity = '0.4';
    sendBtn.style.cursor = 'not-allowed';
    sendBtn.disabled = true;

    showTyping();
    isLoading = true;

    var xhr = new XMLHttpRequest();
    xhr.open('POST', CONFIG.apiUrl + '/api/chat', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        removeTyping();
        isLoading = false;
        var reply = '';
        try {
          var d = JSON.parse(xhr.responseText);
          reply = d.reply || T.error;
        } catch (e) {
          reply = T.error;
        }
        addMessage(reply, 'bot');
      }
    };
    xhr.onerror = function () {
      removeTyping();
      isLoading = false;
      addMessage(T.netError, 'bot');
    };
    xhr.send(JSON.stringify({ message: text, language: LANGUAGE }));
  }

  function sendWelcome() {
    setTimeout(function () { addMessage(T.welcome, 'bot'); }, CONFIG.welcomeDelay);
  }

  function open() {
    if (isOpen) return;
    win.style.display = 'flex';
    bubble.style.display = 'none';
    isOpen = true;
    if (messages.length === 0) sendWelcome();
    setTimeout(function () { input.focus(); }, 300);
  }

  function close() {
    if (!isOpen) return;
    win.style.display = 'none';
    bubble.style.display = 'flex';
    isOpen = false;
  }

  function toggle() { isOpen ? close() : open(); }

  // 点击外部关闭
  document.addEventListener('click', function (e) {
    if (isOpen && !container.contains(e.target)) close();
  });

  // 如果配置了自动打开
  if (CONFIG.autoOpen) setTimeout(open, 300);
})();
</script>

</body>
</html>
