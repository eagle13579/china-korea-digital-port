<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 성공 — 중한 해외진출 디지털 포트</title>
    <meta name="description" content="결제 성공 — 중한 해외진출 디지털 포트">
    <link rel="icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-primary: #0A0A0F;
            --bg-secondary: #12121A;
            --bg-tertiary: #1A1A25;
            --accent: #6366f1;
            --accent2: #06b6d4;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-color: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }
        .header__content { display: flex; align-items: center; justify-content: space-between; height: 68px; }
        .header__logo { display: flex; align-items: center; gap: 10px; }
        .logo__text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header__nav .nav__list { display: flex; list-style: none; gap: 4px; }
        .nav__link { text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border-radius: 8px; color: var(--text-secondary); transition: all 0.2s; }
        .nav__link:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
        .success-page { padding-top: 120px; padding-bottom: 80px; min-height: 70vh; display: flex; align-items: center; }
        .success-container { max-width: 520px; margin: 0 auto; text-align: center; }
        .success-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 24px; padding: 48px 36px; }
        .success-card .icon-wrap { width: 80px; height: 80px; margin: 0 auto 24px; background: rgba(34,197,94,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .success-card .icon-wrap i { font-size: 40px; color: #22c55e; }
        .success-card h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .success-card .subtitle { color: var(--text-secondary); margin-bottom: 24px; }
        .success-card .order-summary { background: var(--bg-tertiary); border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left; }
        .success-card .order-summary .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .success-card .order-summary .row:last-child { border-bottom: none; }
        .success-card .order-summary .label { color: var(--text-secondary); font-size: 14px; }
        .success-card .order-summary .value { font-weight: 500; font-size: 14px; }
        .success-card .order-summary .value.price { font-size: 22px; font-weight: 700; color: var(--accent); }
        .success-card .license-box { background: var(--bg-tertiary); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
        .success-card .license-box .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .success-card .license-box .key { font-size: 20px; font-weight: 700; font-family: monospace; color: var(--accent); letter-spacing: 2px; }
        .success-card .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .success-card .btn-group a { padding: 12px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; transition: all .2s; }
        .success-card .btn-group .btn-primary { background: linear-gradient(135deg, #6366f1, #06b6d4); color: #fff; }
        .success-card .btn-group .btn-primary:hover { opacity: .9; }
        .success-card .btn-group .btn-secondary { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .success-card .btn-group .btn-secondary:hover { background: var(--bg-tertiary); }
        .order-loading { text-align: center; padding: 80px 20px; }
        .order-loading .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .order-error { text-align: center; padding: 80px 20px; }
        .order-error i { font-size: 48px; color: #ef4444; margin-bottom: 16px; }
        .footer { padding: 40px 0; margin-top: 40px; border-top: 1px solid var(--border-color); }
        .footer__bottom { text-align: center; }
        .footer__copyright { font-size: 14px; color: var(--text-muted); }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <div class="header__logo">
                    <h1 class="logo__text">중한 해외진출 디지털 포트</h1>
                </div>
                <nav class="header__nav">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="index_ko.html" class="nav__link">홈</a></li>
                        <li class="nav__item"><a href="pricing_ko.html" class="nav__link">서비스</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="success-page">
        <div class="container">
            <div class="success-container" id="successApp">
                <div class="order-loading" id="loadingView">
                    <div class="spinner"></div>
                    <p>주문 정보 로딩 중...</p>
                </div>
                <div class="order-error" id="errorView" style="display:none">
                    <i class="bi bi-exclamation-circle"></i>
                    <h3>주문 로딩 실패</h3>
                    <p id="errorMsg">주문 정보를 불러올 수 없습니다</p>
                    <a href="pricing_ko.html" class="btn" style="display:inline-block;margin-top:16px;padding:12px 32px;background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;">가격 페이지로</a>
                </div>
                <div class="success-card" id="successView" style="display:none">
                    <div class="icon-wrap">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h2>결제 성공!</h2>
                    <p class="subtitle">구매해 주셔서 감사합니다. 플랜이 활성화되었습니다.</p>
                    <div class="order-summary">
                        <div class="row">
                            <span class="label">주문 번호</span>
                            <span class="value" id="sOrderNo">-</span>
                        </div>
                        <div class="row">
                            <span class="label">플랜</span>
                            <span class="value" id="sPlanName">-</span>
                        </div>
                        <div class="row">
                            <span class="label">금액</span>
                            <span class="value price" id="sPrice">-</span>
                        </div>
                        <div class="row">
                            <span class="label">결제 시간</span>
                            <span class="value" id="sPaidAt">-</span>
                        </div>
                    </div>
                    <div class="license-box" id="licenseBox" style="display:none">
                        <div class="label">라이선스 키</div>
                        <div class="key" id="sLicenseKey"></div>
                    </div>
                    <div class="btn-group">
                        <a href="index_ko.html" class="btn-primary">홈으로</a>
                        <a href="pricing_ko.html" class="btn-secondary">더 많은 플랜 보기</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p class="footer__copyright">© 2026 중한 해외진출 디지털 포트. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/toast.js"></script>
    <script src="js/main.js"></script>
    <script>
    var urlParams = new URLSearchParams(window.location.search);
    var orderId = urlParams.get('order_id');

    document.addEventListener('DOMContentLoaded', function() {
        if (!orderId) {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('errorView').style.display = 'block';
            document.getElementById('errorMsg').textContent = '주문 번호가 없습니다';
            return;
        }
        loadOrder();
    });

    async function loadOrder() {
        try {
            var response = await fetch('/api/v1/payment/status/' + orderId);
            var result = await response.json();
            if (response.ok && result.success && result.data) {
                var data = result.data;
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
                document.getElementById('sOrderNo').textContent = data.order_no || ('ORD' + String(orderId).padStart(6, '0'));
                document.getElementById('sPlanName').textContent = data.plan_name || data.plan_type;
                document.getElementById('sPrice').textContent = '¥' + (data.price || 0).toLocaleString();
                document.getElementById('sPaidAt').textContent = data.paid_at || data.updated_at || '-';
                if (data.license_key) {
                    document.getElementById('licenseBox').style.display = 'block';
                    document.getElementById('sLicenseKey').textContent = data.license_key;
                }
            } else {
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('errorView').style.display = 'block';
                document.getElementById('errorMsg').textContent = result.detail || '주문이 존재하지 않습니다';
            }
        } catch (err) {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('errorView').style.display = 'block';
            document.getElementById('errorMsg').textContent = '네트워크 오류';
        }
    }
    </script>
</body>
</html>
