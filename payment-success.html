<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 - 中韩出海数智港</title>
    <meta name="description" content="支付成功 - 中韩出海数智港">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .success-page { padding-top: 120px; padding-bottom: 80px; min-height: 70vh; display: flex; align-items: center; }
        .success-container { max-width: 520px; margin: 0 auto; text-align: center; }
        .success-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 24px; padding: 48px 36px; }
        .success-card .icon-wrap { width: 80px; height: 80px; margin: 0 auto 24px; background: rgba(34,197,94,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .success-card .icon-wrap i { font-size: 40px; color: #22c55e; }
        .success-card h2 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .success-card .subtitle { color: var(--text-secondary); margin-bottom: 24px; }
        .success-card .order-summary { background: var(--bg-tertiary); border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left; }
        .success-card .order-summary .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .success-card .order-summary .row:last-child { border-bottom: none; }
        .success-card .order-summary .label { color: var(--text-secondary); font-size: 14px; }
        .success-card .order-summary .value { font-weight: 500; font-size: 14px; }
        .success-card .order-summary .value.price { font-size: 22px; font-weight: 700; color: var(--accent); }
        .success-card .license-box { background: var(--bg-tertiary); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
        .success-card .license-box .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .success-card .license-box .key { font-size: 20px; font-weight: 700; font-family: monospace; color: var(--accent); letter-spacing: 2px; }
        .success-card .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .success-card .btn-group a { padding: 12px 28px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 15px; transition: all .2s; }
        .success-card .btn-group .btn-primary { background: var(--accent); color: #fff; }
        .success-card .btn-group .btn-primary:hover { opacity: .9; }
        .success-card .btn-group .btn-secondary { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .success-card .btn-group .btn-secondary:hover { background: var(--bg-tertiary); }

        .order-loading { text-align: center; padding: 80px 20px; }
        .order-loading .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .order-error { text-align: center; padding: 80px 20px; }
        .order-error i { font-size: 48px; color: #ef4444; margin-bottom: 16px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <div class="header__logo">
                    <h1 class="logo__text">中韩出海数智港</h1>
                </div>
                <nav class="header__nav">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="index.html" class="nav__link">首页</a></li>
                        <li class="nav__item"><a href="pricing-v2.html" class="nav__link">定价/购买</a></li>
                    </ul>
                </nav>
                <div class="header__theme">
                    <button class="theme-btn" id="themeToggle" aria-label="切换主题">
                        <i class="bi bi-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <section class="success-page">
        <div class="container">
            <div class="success-container" id="successApp">
                <div class="order-loading" id="loadingView">
                    <div class="spinner"></div>
                    <p>加载订单信息...</p>
                </div>
                <div class="order-error" id="errorView" style="display:none">
                    <i class="bi bi-exclamation-circle"></i>
                    <h3>订单加载失败</h3>
                    <p id="errorMsg">无法加载订单信息</p>
                    <a href="pricing-v2.html" class="btn btn--primary">返回定价页</a>
                </div>
                <div class="success-card" id="successView" style="display:none">
                    <div class="icon-wrap">
                        <i class="bi bi-check-circle-fill"></i>
                    </div>
                    <h2 data-lang-key="success_title">支付成功！</h2>
                    <p class="subtitle" data-lang-key="success_subtitle">感谢您的购买，方案已成功激活。</p>

                    <div class="order-summary">
                        <div class="row">
                            <span class="label" data-lang-key="success_order_no">订单号</span>
                            <span class="value" id="sOrderNo">-</span>
                        </div>
                        <div class="row">
                            <span class="label" data-lang-key="success_plan">方案</span>
                            <span class="value" id="sPlanName">-</span>
                        </div>
                        <div class="row">
                            <span class="label" data-lang-key="success_amount">金额</span>
                            <span class="value price" id="sPrice">-</span>
                        </div>
                        <div class="row">
                            <span class="label" data-lang-key="success_time">支付时间</span>
                            <span class="value" id="sPaidAt">-</span>
                        </div>
                    </div>

                    <div class="license-box" id="licenseBox" style="display:none">
                        <div class="label" data-lang-key="success_license">License Key</div>
                        <div class="key" id="sLicenseKey"></div>
                    </div>

                    <div class="btn-group">
                        <a href="index.html" class="btn-primary" data-lang-key="success_home">返回首页</a>
                        <a href="pricing-v2.html" class="btn-secondary" data-lang-key="success_pricing">查看更多方案</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p class="footer__copyright">© 2026 中韩出海数智港. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <script src="js/toast.js"></script>
    <script src="js/main.js"></script>
    <script>
    (function() {
        if (typeof translations !== 'undefined') {
            var extra = {
                'zh-CN': {
                    success_title: '支付成功！',
                    success_subtitle: '感谢您的购买，方案已成功激活。',
                    success_order_no: '订单号',
                    success_plan: '方案',
                    success_amount: '金额',
                    success_time: '支付时间',
                    success_license: 'License Key',
                    success_home: '返回首页',
                    success_pricing: '查看更多方案',
                },
                'ko-KR': {
                    success_title: '결제 성공!',
                    success_subtitle: '구매해 주셔서 감사합니다. 플랜이 활성화되었습니다.',
                    success_order_no: '주문 번호',
                    success_plan: '플랜',
                    success_amount: '금액',
                    success_time: '결제 시간',
                    success_license: '라이선스 키',
                    success_home: '홈으로',
                    success_pricing: '더 많은 플랜 보기',
                }
            };
            for (var lang in extra) {
                if (!translations[lang]) translations[lang] = {};
                Object.assign(translations[lang], extra[lang]);
            }
        }
    })();

    var urlParams = new URLSearchParams(window.location.search);
    var orderId = urlParams.get('order_id');

    document.addEventListener('DOMContentLoaded', function() {
        if (!orderId) {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('errorView').style.display = 'block';
            document.getElementById('errorMsg').textContent = '缺少订单号参数';
            return;
        }
        loadOrder();
    });

    async function loadOrder() {
        try {
            var response = await fetch('/api/v1/payment/status/' + orderId);
            var result = await response.json();

            if (response.ok && result.success && result.data) {
                var data = result.data;
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';

                document.getElementById('sOrderNo').textContent = data.order_no || ('ORD' + String(orderId).padStart(6, '0'));
                document.getElementById('sPlanName').textContent = data.plan_name || data.plan_type;
                document.getElementById('sPrice').textContent = '¥' + (data.price || 0).toLocaleString();
                document.getElementById('sPaidAt').textContent = data.paid_at || data.updated_at || '-';

                if (data.license_key) {
                    document.getElementById('licenseBox').style.display = 'block';
                    document.getElementById('sLicenseKey').textContent = data.license_key;
                }
            } else {
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('errorView').style.display = 'block';
                document.getElementById('errorMsg').textContent = result.detail || '订单不存在';
            }
        } catch (err) {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('errorView').style.display = 'block';
            document.getElementById('errorMsg').textContent = '网络错误';
        }
    }
    </script>
</body>
</html>
